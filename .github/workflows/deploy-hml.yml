name: Deploy Homologação (HML)

on:
  push:
    branches:
      - develop

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: bot-fut
  ECR_REGISTRY: 872095123176.dkr.ecr.us-east-2.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar credenciais da AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login no Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Enables BuildKit for --cache-from / --cache-to support
    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build, Tag e Push da Imagem (HML)
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker buildx build \
          --cache-from type=registry,ref=$REGISTRY/$ECR_REPOSITORY:cache-hml \
          --cache-to   type=registry,ref=$REGISTRY/$ECR_REPOSITORY:cache-hml,mode=max \
          --tag $REGISTRY/$ECR_REPOSITORY:hml \
          --push \
          .

    - name: Deploy na EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/bot-fut-app

          echo "Fazendo login no ECR na EC2..."
          aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin 872095123176.dkr.ecr.us-east-2.amazonaws.com

          echo "Baixando a nova imagem de homologação..."
          docker compose pull bot-fut-hml

          echo "Limpando imagens antigas para não lotar o disco..."
          docker image prune -f